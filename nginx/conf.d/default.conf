server {
    # Bittensor axon ports must be >= 1024; use 8443 for mTLS.
    listen 8443 ssl;
    http2 on;
    server_name _;

    add_header                Strict-Transport-Security "max-age=31536000" always;
    add_header                X-Content-Type-Options nosniff;
    add_header                X-XSS-Protection "1; mode=block";
    add_header                X-Frame-Options DENY;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # mTLS configuration - request client certificate but don't verify it here;
    # the auth service validates the cert against the on-chain registry via Pylon.
    ssl_client_certificate /etc/ssl/certs/ca-certificates.crt;
    ssl_verify_client optional_no_ca;

    include /etc/nginx/config_helpers/gzip.conf;

    access_log                /dev/stdout;
    error_log                 /dev/stderr info;

    client_max_body_size 100M;

    # Protected location — only reached if nexus_auth returns 200.
    # Point proxy_pass at your neuron/application service.
    location / {
        auth_request /auth;
        auth_request_set $auth_status $upstream_status;
        auth_request_set $client_hotkey $upstream_http_x_hotkey;

        proxy_pass http://your-neuron-service:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Hotkey $client_hotkey;
    }

    # Internal auth subrequest location
    location = /auth {
        internal;

        proxy_pass http://auth:8080;
        proxy_pass_request_body off;

        proxy_cache_bypass $http_x_no_cache;

        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;

        # Pass client certificate information to the auth service for validation
        proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
    }
}
