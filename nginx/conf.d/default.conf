server {
    listen 80;
    server_name _;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    add_header                Strict-Transport-Security "max-age=31536000" always;
    add_header                X-Content-Type-Options nosniff;
    add_header                X-XSS-Protection "1; mode=block";
    add_header                X-Frame-Options DENY;

    ssl_certificate /etc/nginx/ssl/nginx.crt;
    ssl_certificate_key /etc/nginx/ssl/nginx.key;

    # mTLS configuration - request client certificate but don't verify it
    # This allows nginx to capture the certificate and pass it to the auth service
    ssl_client_certificate /etc/ssl/certs/ca-certificates.crt;
    ssl_verify_client optional_no_ca;

    include /etc/nginx/config_helpers/gzip.conf;

    access_log                /dev/stdout;
    error_log                 /dev/stderr info;

    client_max_body_size 100M;

    # Protected content location using auth_request
    location / {
        # Use auth_request for authentication based on subrequest result
        auth_request /auth;
        auth_request_set $auth_status $upstream_status;

        # Return 404 for authenticated requests
        # TODO(maciek): Put a real application here, this would serve actual protected content
    }

    # Internal auth subrequest location
    location = /auth {
        internal;

        proxy_pass http://auth:8080;
        proxy_pass_request_body off;

        proxy_cache_bypass $http_x_no_cache;

        proxy_set_header Content-Length "";
        proxy_set_header Host $host;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header X-Original-Method $request_method;

        # Pass client certificate information to auth service
        # These are the headers specified in the issue description
        proxy_set_header X-Client-Cert $ssl_client_escaped_cert;
        proxy_set_header X-Client-Cert-Subject $ssl_client_s_dn;
        proxy_set_header X-Client-Cert-Issuer $ssl_client_i_dn;
    }

}
